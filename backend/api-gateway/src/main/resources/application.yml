server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**, /api/profile/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/${segment}

        - id: task-service
          uri: ${TASK_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/projects/**, /api/tasks/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/${segment}

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/${segment}

jwt:
  secret: ${JWT_SECRET:change-me-in-production-min-32-chars!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.taskflow: DEBUG
    org.springframework.cloud.gateway: INFO
