name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks (detect secrets)
        uses: zricethezav/gitleaks-action@v1
        with:
          args: detect --source . --exit-code 1
