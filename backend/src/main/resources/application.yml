server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/task_manager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret-key: change-me-in-production-please-keep-this-secret-2026
    expiration-ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── AI Service ────────────────────────────────────────────────────────────────
# provider: mock  → uses MockAiProvider (no external calls, no API key needed)
# To switch to a real provider:
#   1. Implement AiProvider in a new class (e.g. BedrockAiProvider)
#   2. Change provider value and add the required credentials below
ai:
  provider: mock
  # real-provider:
  #   api-key: ${AI_API_KEY}
  #   model-id: your-model-id
  #   endpoint: https://your-ai-endpoint
